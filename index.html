<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Data</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
  <!-- Google Analytics Tracking -->
  <!-- Dashboard: https://analytics.google.com/analytics/web/#/a385180260p525537369/reports/intelligenthome -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CSWLG96GVC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-CSWLG96GVC');
  </script>

  <!-- Plotly Basic for minimalist interactive plotting -->
  <script src="https://cdn.plot.ly/plotly-basic-latest.min.js"></script>
  <!-- Marked for professional markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for Code Syntax Highlighting -->
  <link id="hljs-light" rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
  <link id="hljs-dark" rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css" disabled>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --border: #000000;
      --accent: #9333ea;
      --accent2: #059669;
      --hover: #f0f0f0;
      --selected: #e5e5e5;
      --muted: #666666;
      --pos: #008000;
      --neg: #d90429;
      --font: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    [data-theme="dark"] {
      --bg: #0d0d0d;
      --fg: #f4f4f4;
      --border: #f4f4f4;
      --accent: #9333ea;
      --accent2: #34d399;
      --hover: #1a1a1a;
      --selected: #333333;
      --muted: #888888;
      --pos: #00cc00;
      --neg: #ff2a4d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.5;
    }

    /* BRUTALIST SCROLLBAR */
    ::-webkit-scrollbar {
      width: 14px;
      height: 14px;
      background: var(--bg);
      border-left: 2px solid var(--border);
      border-top: 2px solid var(--border);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg);
      border: 2px solid var(--border);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--fg);
    }

    button,
    input,
    select {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      border: 2px solid var(--border);
      padding: 4px 10px;
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.1s;
      font-size: 12px;
    }

    button:hover,
    select:hover {
      background: var(--hover);
      color: var(--accent);
    }

    button:active {
      background: var(--selected);
      color: var(--accent);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* TOP BAR */
    #topbar {
      height: 44px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 15px;
      justify-content: space-between;
      background: var(--bg);
      z-index: 10;
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 18px;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      font-weight: 900;
    }

    #topbar h1 a {
      color: var(--fg);
      text-decoration: none;
    }

    #topbar h1 a:hover {
      color: var(--accent);
    }

    #topbar h1 span {
      color: var(--accent);
    }

    /* LAYOUT */
    #container {
      display: flex;
      flex-grow: 1;
      width: 100%;
      height: 0;
    }

    #sidebar {
      width: 320px;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      height: 100%;
    }

    #resizer {
      width: 5px;
      background: var(--bg);
      border-right: 2px solid var(--border);
      cursor: col-resize;
      transition: background 0.1s;
      flex-shrink: 0;
      z-index: 10;
    }

    #resizer:hover,
    #resizer.resizing {
      background: var(--accent);
      border-right-color: var(--accent);
    }

    #sidebar-search {
      padding: 10px;
      border-bottom: 2px solid var(--border);
    }

    #sidebar-search input {
      width: 100%;
      padding: 8px;
      border: 2px solid var(--border);
      box-shadow: none;
    }

    #file-tree {
      flex-grow: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .tree-folder {
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .tree-item {
      padding: 4px 15px;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      border-bottom: 1px dashed var(--hover);
    }

    .tree-item:hover {
      background: var(--hover);
      color: var(--accent);
    }

    .tree-item.selected {
      background: var(--selected);
      color: var(--fg);
      font-weight: bold;
      border-right: 3px solid var(--accent);
    }

    .tree-item.folder {
      font-weight: bold;
      text-transform: uppercase;
      color: var(--fg);
      background: var(--bg);
    }

    .tree-item.folder:hover {
      background: var(--hover);
    }

    .search-match {
      color: var(--accent) !important;
      font-weight: bold;
    }

    #main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #toolbar {
      padding: 10px 15px;
      border-bottom: 2px solid var(--border);
      display: flex;
      gap: 15px;
      align-items: center;
      background: var(--bg);
      flex-wrap: wrap;
    }

    #btn-pin {
      margin-left: 10px;
    }

    #btn-pin.pinned {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--selected);
    }

    #metadata-bar {
      padding: 6px 15px;
      border-bottom: 1px dashed var(--border);
      background: var(--hover);
      font-size: 11px;
      text-transform: uppercase;
      display: flex;
      gap: 20px;
      color: var(--muted);
      justify-content: flex-end;
    }

    .meta-val {
      color: var(--fg);
      font-weight: bold;
    }

    #content-area {
      flex-grow: 1;
      overflow: auto;
      padding: 20px;
      position: relative;
    }

    /* DATA RENDERERS */
    .info-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      letter-spacing: 1px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      table-layout: auto;
    }

    th,
    td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      text-align: left;
      word-wrap: break-word;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      background: var(--fg);
      color: var(--bg);
      position: sticky;
      top: 0;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.5px;
      z-index: 2;
    }

    th:hover {
      background: var(--accent);
    }

    td a {
      color: var(--accent2);
      text-decoration: underline;
      font-weight: bold;
    }

    td a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .val-pos {
      color: var(--pos);
      font-weight: bold;
    }

    .val-neg {
      color: var(--neg);
      font-weight: bold;
    }

    /* RESUME/CARD VIEW */
    .kv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .kv-card {
      border: 2px solid var(--border);
      padding: 12px;
      background: var(--bg);
      box-shadow: 2px 2px 0px var(--fg);
      display: flex;
      flex-direction: column;
    }

    .kv-metric {
      font-weight: bold;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 2px dotted var(--border);
      margin-bottom: 8px;
      padding-bottom: 4px;
      font-size: 11px;
    }

    .kv-val {
      font-size: 16px;
      word-wrap: break-word;
      font-weight: bold;
    }

    /* PLOT AREA */
    #plot-container {
      width: 100%;
      height: 350px;
      border: 2px solid var(--border);
      margin-bottom: 20px;
      display: none;
      background: var(--bg);
      box-shadow: 4px 4px 0px var(--fg);
    }

    /* MARKDOWN RENDERER */
    .markdown-body {
      max-width: 900px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .markdown-body h1 {
      border-bottom: 4px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 20px;
      font-size: 28px;
      text-transform: uppercase;
    }

    .markdown-body h2 {
      border-bottom: 2px solid var(--border);
      padding-bottom: 5px;
      margin-top: 30px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .markdown-body h3 {
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .markdown-body p {
      margin-bottom: 16px;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin-bottom: 16px;
      padding-left: 20px;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 16px auto;
      border: 1px solid var(--border);
    }

    .markdown-body code {
      background: var(--hover);
      color: var(--fg);
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
    }

    .markdown-body pre {
      background: var(--hover);
      color: var(--fg);
      padding: 15px;
      overflow: auto;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--accent);
      margin: 0 0 16px;
      padding: 0 15px;
      color: var(--muted);
    }

    .markdown-body table {
      width: 100%;
      margin-bottom: 16px;
    }

    .markdown-body table th {
      background: var(--fg);
      color: var(--bg);
    }

    .markdown-body a {
      color: var(--accent2);
      font-weight: bold;
      text-decoration: none;
      border-bottom: 1px solid var(--accent2);
    }

    .markdown-body a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    #footer {
      border-top: 2px solid var(--border);
      padding: 6px 15px;
      font-size: 10px;
      text-align: center;
      background: var(--bg);
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
    }

    #footer a {
      color: var(--muted);
      text-decoration: none;
      font-weight: bold;
    }

    #footer a:hover {
      color: var(--accent);
    }

    /* UTILS */
    .hidden {
      display: none !important;
    }

    #tooltip {
      position: absolute;
      background: var(--bg);
      border: 2px solid var(--fg);
      color: var(--fg);
      padding: 8px 12px;
      font-size: 11px;
      max-width: 500px;
      pointer-events: none;
      display: none;
      z-index: 100;
      box-shadow: 4px 4px 0px var(--accent);
      white-space: pre-wrap;
      word-wrap: break-word;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <h1>📈 Market Data</h1>
    <div style="display:flex; align-items:center; gap: 10px;">
      <a href="https://github.com/jake-g/market-pipeline" target="_blank"
        style="text-decoration: none; display: flex;"><button style="padding: 5px 10px;">GITHUB</button></a>
      <input type="color" id="accent-color-picker" value="#9333ea" title="Choose Accent Color"
        style="cursor: pointer; border: 2px solid var(--border); background: var(--bg); padding: 0; width: 30px; height: 30px;">
      <button id="btn-theme" title="Toggle Theme"
        style="cursor: pointer; border: 2px solid var(--border); background: var(--bg); padding: 3px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;">
        <div style="background: var(--fg); width: 100%; height: 90%; pointer-events: none;"></div>
      </button>
    </div>
  </div>

  <div id="container">
    <div id="sidebar">
      <div id="sidebar-search">
        <input type="text" id="search-input" placeholder="FILTER FILES..." autocomplete="off">
      </div>
      <div id="file-tree">
        <div class="info-msg" style="font-size:13px; padding: 20px;">
          LOADING DASHBOARD FILE TREE...<br><br>
          <span style="font-size:10px; color:var(--accent);">WAITING FOR DATA SOURCE</span>
        </div>
      </div>
    </div>

    <div id="resizer" title="Drag to resize"></div>

    <div id="main">
      <div id="toolbar" class="hidden">
        <div style="display:flex; align-items:center;">
          <button id="btn-pin" title="Pin File" class="hidden" style="margin-left: 0; margin-right: 10px;">PIN</button>
          <span id="current-file"
            style="font-weight:900; color:var(--fg); font-size:16px; text-transform:uppercase;"></span>
        </div>
        <span id="external-links" style="margin-right:auto; display:flex; gap:10px; align-items:center;"></span>

        <input type="text" id="table-filter" class="hidden" placeholder="FILTER..." autocomplete="off"
          style="padding:4px 8px; border: 2px solid var(--border); background:var(--bg); color:var(--fg); width:130px; font-family:var(--font); text-transform:uppercase;">

        <div id="plot-controls" class="hidden" style="display:flex; gap:10px; align-items:center;">
          <select id="plot-y-col" class="hidden" style="max-width:200px; text-overflow: ellipsis;"></select>
          <button id="btn-plot">PLOT</button>
        </div>

        <button id="btn-view-toggle" class="hidden">VIEW</button>
      </div>

      <div id="metadata-bar" class="hidden">
        <div>SIZE: <span id="meta-size" class="meta-val">--</span></div>
        <div>MODIFIED: <span id="meta-date" class="meta-val">--</span></div>
        <div id="meta-lines-container">LINES: <span id="meta-lines" class="meta-val">--</span></div>
        <div id="meta-rows-container">ROWS: <span id="meta-rows" class="meta-val">--</span></div>
        <div id="meta-cols-container">COLS: <span id="meta-cols" class="meta-val">--</span></div>
      </div>

      <div id="content-area">
        <div id="plot-container"></div>
        <div id="data-container">
          <div class="info-msg">READY.</div>
        </div>
      </div>
      <!--
<div id="footer">
  <div>&copy; 2026 <a href="https://github.com/jake-g" target="_blank">Jake Garrison</a></div>
  <div><a href="https://github.com/jake-g/market-pipeline" target="_blank">View on GitHub</a> | MIT License</div>
</div>
-->
    </div>
  </div>

  <div id="tooltip"></div>

  <script>
    // --- THEME INITIALIZATION ---
    const btnTheme = document.getElementById('btn-theme');
    btnTheme.addEventListener('click', () => {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');

      const hljsLight = document.getElementById('hljs-light');
      const hljsDark = document.getElementById('hljs-dark');
      if (hljsLight && hljsDark) {
        if (!isDark) {
          hljsLight.setAttribute('disabled', 'disabled');
          hljsDark.removeAttribute('disabled');
        } else {
          hljsDark.setAttribute('disabled', 'disabled');
          hljsLight.removeAttribute('disabled');
        }
      }

      if (currentPlotData && plotContainer.style.display !== 'none') updatePlot();
    });

    const accentPicker = document.getElementById('accent-color-picker');
    accentPicker.addEventListener('input', (e) => {
      document.documentElement.style.setProperty('--accent', e.target.value);
      if (currentPlotData && plotContainer.style.display !== 'none') updatePlot();
    });

    // --- GLOBAL STATE ---
    let fileStructure = {}; // path -> {type, size, lastModified, url}
    let currentFileMeta = null;
    let pData = { cols: [], rows: [] }; // Parsed tabular data
    let currentSortCol = null;
    let sortAsc = true;
    let isCardView = false;
    let currentPlotData = null; // { xCol, yCol }
    let tableFilterString = '';
    let rawTreeItems = [];
    let pinnedPaths = JSON.parse(localStorage.getItem('mp_pinned') || '[]');

    // --- DOM ELEMENTS ---
    const treeDiv = document.getElementById('file-tree');
    const searchInput = document.getElementById('search-input');
    const tableFilterInput = document.getElementById('table-filter');
    const btnPin = document.getElementById('btn-pin');

    const toolbar = document.getElementById('toolbar');
    const metabar = document.getElementById('metadata-bar');
    const currFileLbl = document.getElementById('current-file');
    const metaSize = document.getElementById('meta-size');
    const metaDate = document.getElementById('meta-date');
    const metaLines = document.getElementById('meta-lines');
    const metaLinesContainer = document.getElementById('meta-lines-container');
    const metaRows = document.getElementById('meta-rows');
    const metaCols = document.getElementById('meta-cols');
    const metaRowsContainer = document.getElementById('meta-rows-container');
    const metaColsContainer = document.getElementById('meta-cols-container');

    const dataContainer = document.getElementById('data-container');
    const plotControls = document.getElementById('plot-controls');
    const plotYCol = document.getElementById('plot-y-col');
    const plotColCheckboxes = document.getElementById('plot-col-checkboxes');
    const btnPlot = document.getElementById('btn-plot');
    const plotContainer = document.getElementById('plot-container');
    const btnViewToggle = document.getElementById('btn-view-toggle');
    const tooltip = document.getElementById('tooltip');

    // Allow rendering marked.js safely
    marked.setOptions({
      gfm: true,
      breaks: true,
      headerIds: true
    });

    btnPin.addEventListener('click', () => {
      if (!currentFileMeta) return;
      const path = currentFileMeta.path;
      const idx = pinnedPaths.indexOf(path);
      if (idx >= 0) {
        pinnedPaths.splice(idx, 1);
        btnPin.innerText = 'PIN';
        btnPin.classList.remove('pinned');
        btnPin.title = "Pin File";
      } else {
        pinnedPaths.push(path);
        btnPin.innerText = 'PINNED';
        btnPin.classList.add('pinned');
        btnPin.title = "Unpin File";
      }
      localStorage.setItem('mp_pinned', JSON.stringify(pinnedPaths));

      // Re-render tree non-destructively to update the PINNED section
      if (rawTreeItems.length > 0) {
        renderTree(rawTreeItems);
      }

      // Reselect the active file
      document.querySelectorAll('.tree-item.file').forEach(i => {
        if (i.getAttribute('data-path') === path) {
          i.classList.add('selected');
        }
      });
    });

    // --- DIRECTORY HANDLING (API SERVER DEPENDENT) ---

    async function fetchDirectoryTree() {
      treeDiv.innerHTML = '<div class="info-msg" style="font-size:12px;">SCANNING DATA...</div>';
      try {
        // We always fetch market_data/index.json (cache-busted).
        // Locally, this is intercepted by market_dashboard_server.py.
        // On GitHub pages, this loads the static file.
        const response = await fetch('market_data/index.json?t=' + new Date().getTime());
        if (!response.ok) throw new Error("Could not load market_data/index.json");
        const items = await response.json();

        rawTreeItems = items;
        fileStructure = {};
        buildFlatMap(items);
        renderTree(items);

        // Auto-expand market_data and reports
        setTimeout(() => {
          const mdFolder = document.querySelector('.tree-item.folder[data-path="market_data"]');
          if (mdFolder && mdFolder.innerText.startsWith('[+]')) {
            mdFolder.click();
          }
          const repFolder = document.querySelector('.tree-item.folder[data-path="reports"]');
          if (repFolder && repFolder.innerText.startsWith('[+]')) {
            repFolder.click();
          }

          const statsFile = document.querySelector('.tree-item.file[data-path="market_data/STATS.md"]');
          if (statsFile) {
            statsFile.click();
          }
        }, 100);

      } catch (e) {
        console.error(e);
        treeDiv.innerHTML = `<div class="info-msg" style="font-size:12px; color:var(--accent); padding:20px;">
                    CONNECTION FAILED.<br><br>
                    Ensure you are running:<br><code>python market_dashboard_server.py</code>
                    <br>OR<br>that <code>market_data/index.json</code> exists for static hosting.
                    <br><br>${e.message}
                </div>`;
      }
    }

    // Auto-load on start
    window.addEventListener('DOMContentLoaded', fetchDirectoryTree);

    function buildFlatMap(nodes) {
      for (const n of nodes) {
        if (n.type === 'file') {
          // Prepend './' to ensure relative URL fetching
          n.url = './' + n.path;
          fileStructure[n.path] = n;
        } else if (n.type === 'folder' && n.children) {
          buildFlatMap(n.children);
        }
      }
    }

    function renderTree(items) {
      treeDiv.innerHTML = '';

      function buildHTML(nodes, level) {
        let html = '';
        for (const node of nodes) {
          if (node.type === 'folder') {
            html += `<div class="tree-item folder" data-path="${node.path}" style="padding-left: ${10 + level * 15}px;">[+] ${node.name}</div>`;
            let childHTML = buildHTML(node.children || [], level + 1);
            // Make ID safe
            const safeId = node.path.replace(/[^a-zA-Z0-9-]/g, '-');
            html += `<div class="folder-children" id="folder-${safeId}" style="display:none;">${childHTML}</div>`;
          } else {
            html += `<div class="tree-item file" data-path="${node.path}" style="padding-left: ${10 + level * 15}px;">${node.name}</div>`;
          }
        }
        return html;
      }

      let finalHtml = '';
      if (pinnedPaths.length > 0) {
        finalHtml += `<div class="tree-item folder" data-path="pinned-virtual-folder" style="padding-left: 10px; color:var(--accent);">[-] PINNED FAVORITES</div>`;
        let childHTML = '';
        pinnedPaths.forEach(p => {
          const filename = p.split('/').pop() || p;
          childHTML += `<div class="tree-item file" data-path="${p}" style="padding-left: 25px; color:var(--accent); font-weight:bold;">★ ${filename}</div>`;
        });
        finalHtml += `<div class="folder-children" id="folder-pinned-virtual-folder" style="display:block; border-bottom: 2px dashed var(--accent); margin-bottom: 15px;">${childHTML}</div>`;
      }

      finalHtml += buildHTML(items, 0);
      treeDiv.innerHTML = finalHtml;

      treeDiv.querySelectorAll('.folder').forEach(el => {
        el.addEventListener('click', () => {
          const safeId = el.getAttribute('data-path').replace(/[^a-zA-Z0-9-]/g, '-');
          const childDiv = document.getElementById(`folder-${safeId}`);
          if (!childDiv) return;
          if (childDiv.style.display === 'none') {
            childDiv.style.display = 'block';
            el.innerText = `[-] ${el.innerText.substring(4)}`;
          } else {
            childDiv.style.display = 'none';
            el.innerText = `[+] ${el.innerText.substring(4)}`;
          }
        });
      });

      treeDiv.querySelectorAll('.file').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.tree-item.file').forEach(i => i.classList.remove('selected'));
          el.classList.add('selected');
          loadFile(el.getAttribute('data-path'));
        });
      });

      buildSearchIndex();
    }

    // --- SEARCH ---
    let searchIndex = []; // { el: DOMNode, text: string, parents: [DOMNode] }

    function buildSearchIndex() {
      searchIndex = [];
      document.querySelectorAll('.tree-item.file').forEach(el => {
        let parents = [];
        let parent = el.parentElement;
        while (parent && parent.classList.contains('folder-children')) {
          parents.push(parent);

          let prev = parent.previousElementSibling;
          if (prev && prev.classList.contains('folder')) {
            parents.push(prev); // Store the folder label too so we can ensure it shows
          }
          parent = parent.parentElement;
        }

        // Use ticker/path as search text
        const text = el.getAttribute('data-path').toLowerCase();
        searchIndex.push({ el, text, parents });
      });
    }

    searchInput.addEventListener('input', debounce((e) => {
      const q = e.target.value.toLowerCase();

      // Reset styles cleanly
      searchIndex.forEach(item => {
        item.el.classList.remove('search-match');
        if (item.parents && item.parents.length > 0) {
          item.parents.forEach(p => {
            if (p.classList.contains('folder')) p.classList.remove('search-match');
          });
        }
      });

      if (!q) return;

      let firstMatch = null;

      // Find and Highlight
      searchIndex.forEach(item => {
        if (item.text.includes(q)) {
          item.el.classList.add('search-match');

          if (!firstMatch) {
            firstMatch = item.el;
          }

          item.parents.forEach(p => {
            p.style.display = 'block';
            if (p.classList.contains('folder')) {
              p.classList.add('search-match');
              if (p.innerText.startsWith('[+]')) {
                p.innerText = `[-] ${p.innerText.substring(4)}`;
              }
            }
          });
        }
      });

      if (firstMatch) {
        firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

    }, 250));

    // Debounce Utility
    function debounce(func, wait) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(...args), wait);
      };
    }

    function formatBytes(bytes, decimals = 2) {
      if (!+bytes) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
    }

    function formatDate(timestamp) {
      const d = new Date(timestamp);
      return d.toLocaleString();
    }

    // --- LOAD FILE ---
    async function loadFile(path) {
      try {
        const fileMeta = fileStructure[path];
        if (!fileMeta) throw new Error("File metadata not found in index.");
        currentFileMeta = fileMeta;

        currFileLbl.innerText = path;

        btnPin.classList.remove('hidden');
        if (pinnedPaths.includes(path)) {
          btnPin.innerText = 'PINNED';
          btnPin.style.color = 'var(--accent)';
          btnPin.style.borderColor = 'var(--accent)';
        } else {
          btnPin.innerText = 'PIN';
          btnPin.style.color = 'var(--fg)';
          btnPin.style.borderColor = 'var(--border)';
        }

        const extLinks = document.getElementById('external-links');
        if (extLinks) {
          extLinks.innerHTML = '';
          const match = path.match(/tickers\/([^\/]+)\//);
          if (match && match.length >= 2) {
            const rawTicker = match[1];
            // Remove Caret prefix from indices for SA/TV (e.g., ^RUT -> RUT)
            const cleanTicker = rawTicker.startsWith('^') ? rawTicker.substring(1) : rawTicker;
            extLinks.innerHTML = `
              <a href="https://finance.yahoo.com/quote/${rawTicker}" target="_blank" style="text-decoration:none;"><button style="font-size:10px; padding:2px 6px;">YAHOO</button></a>
              <a href="https://seekingalpha.com/symbol/${cleanTicker}" target="_blank" style="text-decoration:none;"><button style="font-size:10px; padding:2px 6px;">SEEKING ALPHA</button></a>
              <a href="https://www.tradingview.com/chart/?symbol=${cleanTicker}" target="_blank" style="text-decoration:none;"><button style="font-size:10px; padding:2px 6px;">TRADINGVIEW</button></a>
            `;
          }
        }

        tableFilterString = '';
        tableFilterInput.value = '';

        toolbar.classList.remove('hidden');
        metabar.classList.remove('hidden');

        metaSize.innerText = formatBytes(fileMeta.size);
        metaDate.innerText = fileMeta.lastModified ? formatDate(fileMeta.lastModified) : 'N/A';

        dataContainer.innerHTML = '<div class="info-msg">DOWNLOADING...</div>';
        plotContainer.style.display = 'none';
        currentPlotData = null;

        const ext = path.split('.').pop().toLowerCase();

        if (['png', 'jpg', 'jpeg'].includes(ext)) {
          dataContainer.innerHTML = `<div style="text-align:center; padding:20px;"><img src="${fileMeta.url}?t=${new Date().getTime()}" style="max-width:100%; border:2px solid var(--border); box-shadow:4px 4px 0px var(--fg);"></div>`;
          plotControls.classList.add('hidden');
          btnViewToggle.classList.add('hidden');
          metaRowsContainer.classList.add('hidden');
          metaColsContainer.classList.add('hidden');
          metaLinesContainer.classList.add('hidden');
          return;
        }

        // Fetch the actual file contents via HTTP GET
        const response = await fetch(fileMeta.url + "?t=" + new Date().getTime());
        if (!response.ok) throw new Error(`HTTP ${response.status} loading file`);
        const text = await response.text();

        // Use precomputed lines if available, otherwise fallback
        const lineCount = fileMeta.lines !== undefined ? fileMeta.lines : text.split(/\r?\n/).length;
        metaLines.innerText = lineCount;
        metaLinesContainer.classList.remove('hidden');

        if (ext === 'md') {
          renderMarkdown(text);
          plotControls.classList.add('hidden');
          btnViewToggle.classList.add('hidden');
          metaRowsContainer.classList.add('hidden');
          metaColsContainer.classList.add('hidden');
        } else if (ext === 'py') {
          // Wrap python code in markdown block for exact syntax handling
          const pyMarkdown = "```python\n" + text + "\n```";
          renderMarkdown(pyMarkdown);
          plotControls.classList.add('hidden');
          btnViewToggle.classList.add('hidden');
          metaRowsContainer.classList.add('hidden');
          metaColsContainer.classList.add('hidden');
        } else if (ext === 'tsv' || ext === 'csv') {
          parseDelimited(text, ext === 'tsv' ? '\t' : ',');
          metaLinesContainer.classList.add('hidden');
          metaRowsContainer.classList.remove('hidden');
          metaColsContainer.classList.remove('hidden');
          metaRows.innerText = pData.rows.length;
          metaCols.innerText = pData.cols.length;

          setupToolbar(path);
          renderData();
        } else {
          // txt or json - plain text fallback
          dataContainer.innerHTML = `<pre style="padding:20px; font-size:12px; white-space:pre-wrap; word-wrap:break-word; max-width:100%; overflow-x:auto;">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</pre>`;
          plotControls.classList.add('hidden');
          btnViewToggle.classList.add('hidden');
          metaRowsContainer.classList.add('hidden');
          metaColsContainer.classList.add('hidden');
        }
      } catch (e) {
        console.error(e);
        dataContainer.innerHTML = `<div class="info-msg" style="color:var(--accent);">ERROR: ${e.message}</div>`;
      }
    }

    // --- PARSER ---
    function parseDelimited(text, delimiter) {
      const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
      if (lines.length === 0) {
        pData = { cols: [], rows: [] };
        return;
      }

      const cols = lines[0].split(delimiter);
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const vals = lines[i].split(delimiter);
        const rowObj = {};
        cols.forEach((c, idx) => {
          let v = vals[idx] || '';
          if (!isNaN(v) && v !== '') {
            v = parseFloat(v);
          }
          rowObj[c] = v;
        });
        rows.push(rowObj);
      }
      pData = { cols, rows };
      currentSortCol = null;
    }

    function setupToolbar(path) {
      if ((path.includes('fundamentals') || path.includes('stats') || pData.cols.length > 15) && !path.includes('portfolios') && !pData.cols.includes('Ticker')) {
        isCardView = true;
      } else {
        isCardView = false;
      }

      if (!isCardView && pData.rows.length > 0) {
        tableFilterInput.classList.remove('hidden');
      } else {
        tableFilterInput.classList.add('hidden');
      }

      btnViewToggle.classList.remove('hidden');

      // Plot setup: find an axis containing date/time concepts
      const dateCol = pData.cols.find(c => {
        const l = c.toLowerCase();
        return l === 'date' || l === 'timestamp' || l === 'period' || l === 'datetime' || l.includes('date');
      });

      const tickerCol = pData.cols.find(c => c.toLowerCase() === 'ticker');

      if (dateCol && pData.rows.length > 1) {
        plotControls.classList.remove('hidden');
        if (plotYCol) plotYCol.classList.add('hidden');

        currentPlotData = { xCol: dateCol, yCols: [] };
        pData.cols.forEach(c => {
          if (c !== dateCol && typeof pData.rows[0][c] === 'number') {
            currentPlotData.yCols.push(c);
          }
        });
      } else if (tickerCol && pData.rows.length > 1) {
        plotControls.classList.remove('hidden');
        if (plotYCol) plotYCol.classList.remove('hidden');

        currentPlotData = { xCol: tickerCol, yCols: [] };

        if (plotYCol) {
          plotYCol.innerHTML = '';
          pData.cols.forEach(c => {
            if (c !== tickerCol && typeof pData.rows[0][c] === 'number') {
              currentPlotData.yCols.push(c);
              const opt = document.createElement('option');
              opt.value = c;
              opt.text = c;
              plotYCol.appendChild(opt);
            }
          });

          if (pData.cols.includes('Unrealized_PnL_Pct')) plotYCol.value = 'Unrealized_PnL_Pct';
          else if (pData.cols.includes('Portfolio_Weight_Pct')) plotYCol.value = 'Portfolio_Weight_Pct';
          else if (pData.cols.includes('Unrealized_PnL_Net')) plotYCol.value = 'Unrealized_PnL_Net';
        }
      } else {
        plotControls.classList.add('hidden');
        if (plotYCol) plotYCol.classList.add('hidden');
        currentPlotData = null;
      }
    }

    btnViewToggle.addEventListener('click', () => {
      isCardView = !isCardView;
      renderData();
    });

    btnPlot.addEventListener('click', () => {
      if (!currentPlotData) return;
      if (currentPlotData.yCols.length === 0) return;
      updatePlot();
    });

    if (plotYCol) {
      plotYCol.addEventListener('change', () => {
        if (plotContainer.style.display !== 'none') {
          updatePlot();
        }
      });
    }

    tableFilterInput.addEventListener('input', debounce((e) => {
      tableFilterString = e.target.value.trim();
      renderData();
    }, 250));

    // --- FORMATTING HEURISTICS ---
    function formatNumber(num) {
      if (Math.abs(num) >= 1e9) {
        return (num / 1e9).toFixed(2) + 'B';
      }
      if (Math.abs(num) >= 1e6) {
        return (num / 1e6).toFixed(2) + 'M';
      }
      if (Math.abs(num) >= 1e4) {
        return (num / 1e3).toFixed(1) + 'K';
      }
      if (num % 1 !== 0) return num.toFixed(4);
      return num;
    }

    function valToCell(col, val) {
      if (val === null || val === undefined) return '';

      let displayHTML = '';

      // Basic URL wrap
      if (typeof val === 'string') {
        if (val.startsWith('<a ')) {
          displayHTML = val; // let raw html anchors mostly pass
        } else if (val.startsWith('http')) {
          displayHTML = `<a href="${val}" target="_blank">LINK</a>`;
        } else {
          displayHTML = val.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
      } else if (typeof val === 'number') {
        const origVal = val;
        let formattedVal = formatNumber(origVal);

        // Colorize heuristics based on Col name / value
        const lowerCol = col.toLowerCase();
        const shouldColor = lowerCol.includes('change') || lowerCol.includes('surp') || lowerCol.includes('profit') || lowerCol.includes('margin') || lowerCol.includes('sentiment');

        if (shouldColor) {
          if (origVal > 0) displayHTML = `<span class="val-pos">${formattedVal}</span>`;
          else if (origVal < 0) displayHTML = `<span class="val-neg">${formattedVal}</span>`;
          else displayHTML = formattedVal;
        } else {
          displayHTML = formattedVal;
        }
      }
      return displayHTML;
    }

    // --- RENDERERS ---
    function renderMarkdown(text) {
      const renderer = new marked.Renderer();

      marked.setOptions({
        highlight: function (code, lang) {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        }
      });

      renderer.code = function (code, language) {
        let isTokenObj = false;
        let actualCode = code;
        let actualLang = language;

        // Handle marked.js v13+ Token object
        if (typeof code === 'object' && code !== null) {
          isTokenObj = true;
          actualCode = code.text;
          actualLang = code.lang;
        }

        const validLang = actualLang && hljs.getLanguage(actualLang) ? actualLang : 'plaintext';
        let highlighted;
        try {
          highlighted = actualLang ? hljs.highlight(actualCode, { language: validLang }).value : hljs.highlightAuto(actualCode).value;
        } catch (e) {
          highlighted = actualCode;
        }

        return `<pre><code class="hljs ${validLang}">${highlighted}</code></pre>`;
      };

      const defaultImageRenderer = renderer.image.bind(renderer);

      renderer.image = function (href, title, text_alt) {
        let isTokenObj = false;
        let actualHref = href;

        // Handle marked.js v13+ which passes a Token object natively
        if (typeof href === 'object' && href !== null && href.href) {
          isTokenObj = true;
          actualHref = href.href;
        }

        if (currentFileMeta && currentFileMeta.path) {
          // If the image is a relative path (starts with ./ or just a filename, lacking http://)
          if (actualHref && typeof actualHref === 'string' && !actualHref.startsWith('http') && !actualHref.startsWith('data:')) {
            // Strip leading ./
            if (actualHref.startsWith('./')) {
              actualHref = actualHref.substring(2);
            }
            // Extract the directory of the currently active document
            const lastSlashIdx = currentFileMeta.path.lastIndexOf('/');
            const dirPath = lastSlashIdx >= 0 ? currentFileMeta.path.substring(0, lastSlashIdx) : '';
            // Prepend relative directory strictly to the image source
            if (dirPath) {
              actualHref = dirPath + '/' + actualHref;
            }
          }
        }

        if (isTokenObj) {
          const tokenOverride = Object.assign({}, href);
          tokenOverride.href = actualHref;
          return defaultImageRenderer(tokenOverride);
        }
        return defaultImageRenderer(actualHref, title, text_alt);
      };

      const html = marked.parse(text, { renderer: renderer });
      dataContainer.innerHTML = `<div class="markdown-body">${html}</div>`;
    }

    function renderData() {
      if (pData.cols.length === 0) {
        dataContainer.innerHTML = '<div class="info-msg">EMPTY OR MALFORMED FILE</div>';
        return;
      }

      if (isCardView) {
        renderCardView();
      } else {
        renderTableView();
      }

      // setup hover tooltips for truncated content
      document.querySelectorAll('td, .kv-val').forEach(el => {
        el.addEventListener('mouseenter', (e) => {
          // Check if element is truncated
          if (el.scrollWidth > el.clientWidth) {
            // Extract raw text or HTML carefully
            tooltip.innerHTML = el.innerHTML;
            tooltip.style.display = 'block';
            positionTooltip(e);
          }
        });
        el.addEventListener('mousemove', positionTooltip);
        el.addEventListener('mouseleave', () => {
          tooltip.style.display = 'none';
        });
      });
    }

    function positionTooltip(e) {
      let left = e.pageX + 15;
      let top = e.pageY + 15;
      if (left + tooltip.offsetWidth > window.innerWidth) left = window.innerWidth - tooltip.offsetWidth - 10;
      if (top + tooltip.offsetHeight > window.innerHeight) top = window.innerHeight - tooltip.offsetHeight - 10;
      tooltip.style.left = left + 'px';
      tooltip.style.top = top + 'px';
    }

    function renderTableView() {
      let rowsToRender = pData.rows;
      if (tableFilterString) {
        const q = tableFilterString.toLowerCase();
        rowsToRender = rowsToRender.filter(r => {
          return pData.cols.some(c => String(r[c]).toLowerCase().includes(q));
        });
      }

      let html = `<table><thead><tr>`;
      pData.cols.forEach(c => {
        let indicator = '';
        if (c === currentSortCol) indicator = sortAsc ? ' ▲' : ' ▼';
        html += `<th data-col="${c}"><span>${c}</span>${indicator}</th>`;
      });
      html += `</tr></thead><tbody>`;

      // Paginate if massive? (Not requested, just raw render. Brutalist style!)
      let rowLimit = Math.min(rowsToRender.length, 10000);

      for (let i = 0; i < rowLimit; i++) {
        const r = rowsToRender[i];
        html += `<tr>`;
        pData.cols.forEach(c => {
          html += `<td>${valToCell(c, r[c])}</td>`;
        });
        html += `</tr>`;
      }

      if (rowsToRender.length > rowLimit) {
        html += `<tr><td colspan="${pData.cols.length}" style="text-align:center; font-weight:bold; color:var(--muted);">${rowsToRender.length - rowLimit} ROWS TRUNCATED</td></tr>`;
      }

      html += `</tbody></table>`;
      dataContainer.innerHTML = html;

      document.querySelectorAll('th').forEach(th => {
        th.addEventListener('click', () => {
          const c = th.getAttribute('data-col');
          if (c === currentSortCol) {
            sortAsc = !sortAsc;
          } else {
            currentSortCol = c;
            sortAsc = true;
          }
          sortData();
          renderData();
        });
      });
    }

    function renderCardView() {
      let html = `<div class="kv-grid">`;
      let htmlPriority = '';
      let htmlNormal = '';
      let extraSectionsHTML = '';

      // High-priority fields to emphasize and sort to the top
      const priorityMetrics = [
        'marketcap', 'trailingpe', 'forwardpe', 'pegratio', 'dividendyield',
        'profitmargins', 'targetmeanprice', 'recommendationkey',
        'reportedeps', 'epsestimate', 'surprise(%)',
        'totalrevenue', 'netincome', 'grossprofit', 'operatingincome',
        'freecashflow', 'ebitda',
        'gdp', 'cpi', 'unrate', 'fedfunds', 'recessionprob',
        'sentimentscore', 'sentimentlabel'
      ];

      function isPriority(key) {
        const cleanKey = String(key).toLowerCase().replace(/[\s_]/g, '');
        return priorityMetrics.includes(cleanKey);
      }

      // Determine if it's strictly a Key-Value pair set
      const isStrictKV = pData.cols.includes('Metric') && pData.cols.includes('Value');

      let rowLimit = Math.min(pData.rows.length, 500);

      for (let i = 0; i < rowLimit; i++) {
        const r = pData.rows[i];
        if (isStrictKV) {
          const kRaw = r['Metric'];
          const vRaw = r['Value'];

          // Add spaces to camelCase/snake_case for readability
          const k = String(kRaw).replace(/([a-z])([A-Z])/g, '$1 $2').replace(/_/g, ' ').toUpperCase();

          // Generalize: Extract items that are very long or contain complex nested structures (like JSON objects with [{ )
          const vStr = String(vRaw);
          if (vStr.length > 250 || vStr.includes('[{') || kRaw === 'companyOfficers' || kRaw === 'longBusinessSummary') {
            extraSectionsHTML += `<div style="margin-top: 25px; padding: 20px; border: 4px solid var(--border); background: var(--bg); box-shadow: 4px 4px 0px var(--fg);">
                <div class="kv-metric" style="font-size:16px; border-bottom: 2px dashed var(--border); margin-bottom: 15px;">${k}</div>
                <div class="kv-val" style="font-size: 13px; line-height: 1.6; white-space: pre-wrap; font-family: monospace; font-weight:normal;">${valToCell('Value', vRaw)}</div>
            </div>`;
            continue;
          }

          const isPri = isPriority(kRaw);
          const metricStyle = 'white-space: normal;';

          const cardHtml = `<div class="kv-card">
                        <div class="kv-metric" style="${metricStyle}">${k}</div>
                        <div class="kv-val">${valToCell('Value', vRaw)}</div>
                    </div>`;

          if (isPri) htmlPriority += cardHtml;
          else htmlNormal += cardHtml;

        } else {
          // For non-strict KV, sort the columns so priority ones are first
          let pCols = [...pData.cols];
          pCols.sort((a, b) => {
            const aPri = isPriority(a) ? 1 : 0;
            const bPri = isPriority(b) ? 1 : 0;
            return bPri - aPri; // Priority items first
          });

          htmlNormal += `<div class="kv-card" style="grid-column: 1 / -1; display:flex; flex-direction:row; flex-wrap:wrap; gap:20px; border-width: 4px;">`;
          pCols.forEach(c => {
            const isPri = isPriority(c);
            const cSpaced = String(c).replace(/([a-z])([A-Z])/g, '$1 $2').replace(/_/g, ' ').toUpperCase();
            const metricStyle = '';
            htmlNormal += `<div style="min-width:180px; flex:1;">
                            <div class="kv-metric" style="${metricStyle}">${cSpaced}</div>
                            <div class="kv-val" style="font-size:13px; max-height:80px; position:relative; overflow:hidden;">${valToCell(c, r[c])}</div>
                        </div>`;
          });
          htmlNormal += `</div>`;
        }
      }

      html += htmlPriority + htmlNormal;
      html += `</div>`; // Close grid

      if (pData.rows.length > rowLimit) {
        html += `<div style="margin-top:20px; text-align:center; padding: 20px;" class="info-msg">TRUNCATED RESULTS</div>`;
      }

      html += extraSectionsHTML; // Append the huge textual nodes at the bottom

      dataContainer.innerHTML = html;
    }

    function sortData() {
      if (!currentSortCol) return;
      pData.rows.sort((a, b) => {
        let vA = a[currentSortCol];
        let vB = b[currentSortCol];

        // Handle nulls
        if (vA === "" || vA == null) return sortAsc ? 1 : -1;
        if (vB === "" || vB == null) return sortAsc ? -1 : 1;

        if (typeof vA === 'string' && typeof vB === 'string') {
          vA = vA.toLowerCase();
          vB = vB.toLowerCase();
        }

        if (vA < vB) return sortAsc ? -1 : 1;
        if (vA > vB) return sortAsc ? 1 : -1;
        return 0;
      });
    }

    // --- PLOTLY ---
    function updatePlot() {
      if (!currentPlotData || !currentPlotData.yCols || currentPlotData.yCols.length === 0) return;
      plotContainer.style.display = 'block';

      const style = getComputedStyle(document.body);
      const fg = style.getPropertyValue('--fg').trim() || '#000000';
      const bg = style.getPropertyValue('--bg').trim() || '#ffffff';
      const grid = style.getPropertyValue('--border').trim() || '#dddddd';
      const accent = style.getPropertyValue('--accent').trim() || '#d90429';
      const font = style.getPropertyValue('--font').trim();

      const colors = [accent, '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6'];

      const xVals = pData.rows.map(r => r[currentPlotData.xCol]);

      const isPortfolio = currentPlotData.xCol.toLowerCase() === 'ticker';

      let activeYCols = currentPlotData.yCols;
      if (isPortfolio && typeof plotYCol !== 'undefined' && plotYCol && !plotYCol.classList.contains('hidden')) {
        activeYCols = [plotYCol.value];
      }

      if (activeYCols.length === 0) return;

      const traces = activeYCols.map((yCol, idx) => {
        const yVals = pData.rows.map(r => r[yCol]);
        const lowerCol = yCol.toLowerCase();
        const isMA = lowerCol.includes('sma') || lowerCol.includes('ema') || lowerCol.includes('ma_');
        const color = colors[idx % colors.length];

        if (isPortfolio) {
          return {
            name: yCol,
            x: xVals,
            y: yVals,
            type: 'bar',
            marker: { color: color }
          };
        } else {
          return {
            name: yCol,
            x: xVals,
            y: yVals,
            type: 'scatter',
            mode: 'lines+markers',
            line: { color: color, width: 2, dash: isMA ? 'dash' : 'solid' },
            marker: { size: 3, color: color, opacity: 0.3 }
          };
        }
      });

      const layout = {
        title: { text: currentPlotData.yCols.join(' / ').toUpperCase(), font: { color: accent, family: font, size: 14, weight: 'bold' } },
        showlegend: currentPlotData.yCols.length > 1,
        legend: { font: { color: fg, family: font, size: 10 }, orientation: 'h', y: -0.2 },
        plot_bgcolor: bg,
        paper_bgcolor: bg,
        barmode: 'group',
        font: { color: fg, family: font },
        margin: { l: 60, r: 20, t: 40, b: (currentPlotData.yCols.length > 1 ? 60 : 40) },
        xaxis: {
          type: isPortfolio ? 'category' : 'date',
          gridcolor: grid,
          zerolinecolor: fg,
          tickfont: { color: fg, family: font }
        },
        yaxis: {
          gridcolor: grid,
          zerolinecolor: fg,
          tickfont: { color: fg, family: font }
        },
        hovermode: 'x unified'
      };

      const config = {
        responsive: true,
        displayModeBar: true,
        modeBarButtonsToRemove: ['lasso2d', 'select2d'],
        displaylogo: false
      };

      Plotly.newPlot('plot-container', traces, layout, config);
    }

    // --- KEYBOARD NAVIGATION ---
    document.addEventListener('keydown', (e) => {
      // If user is focused on an input, don't hijack unless it's ArrowDown escaping search
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') {
        if (document.activeElement.id === 'search-input' && e.key === 'ArrowDown') {
          document.activeElement.blur();
          e.preventDefault();
        } else {
          return;
        }
      }

      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        const items = Array.from(document.querySelectorAll('.tree-item'));
        const visibleItems = items.filter(el => el.offsetParent !== null); // Check if visible
        if (visibleItems.length === 0) return;

        const selected = document.querySelector('.tree-item.selected');
        let currentIndex = selected ? visibleItems.indexOf(selected) : -1;

        if (e.key === 'ArrowUp') {
          currentIndex = currentIndex > 0 ? currentIndex - 1 : 0;
        } else {
          currentIndex = currentIndex < visibleItems.length - 1 ? currentIndex + 1 : visibleItems.length - 1;
        }

        const newItem = visibleItems[currentIndex];
        document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('selected'));
        newItem.classList.add('selected');
        newItem.scrollIntoView({ behavior: 'smooth', block: 'center' });

        if (newItem.classList.contains('file')) {
          loadFile(newItem.getAttribute('data-path'));
        }
      } else if (e.key === ' ' || e.key === 'Enter') {
        const selected = document.querySelector('.tree-item.selected');
        if (selected && selected.classList.contains('folder')) {
          e.preventDefault();
          selected.click();
        }
      }
    });

    // --- SIDEBAR RESIZER ---
    const resizer = document.getElementById('resizer');
    const sidebarContainer = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
      isResizing = true;
      resizer.classList.add('resizing');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      let newWidth = e.clientX;
      if (newWidth < 200) newWidth = 200;
      if (newWidth > window.innerWidth - 300) newWidth = window.innerWidth - 300;
      sidebarContainer.style.width = newWidth + 'px';
      sidebarContainer.style.minWidth = newWidth + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizer.classList.remove('resizing');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });

  </script>
</body>
