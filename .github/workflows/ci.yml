name: CI Pipeline

on:
  # Run on pushes to main (GitHub) and any dev branches (Gitea)
  push:
    branches: [ "main", "dev-*" ]
  # Run on pull requests
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # Adjust to match your local version
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          # Install lxml system dependencies (noted in your README)
          sudo apt-get install -y libxml2-dev libxslt-dev
          pip install -r requirements.txt

      - name: 🧹 Run Pre-Commit (Formatting, Linting, Typing)
        # This forces the CI server to run the exact rules in your .pre-commit-config.yaml
        run: pre-commit run --all-files

      - name: 🧪 Run Pipeline Tests
        # Make scripts executable and run your test script
        run: |
          chmod +x *.sh
          ./run_tests.sh
        # Uncomment and add secrets if your tests require an API key (like FRED)
        # env:
        #   FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
